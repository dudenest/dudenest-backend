version: "3.9"

# Dudenest Backend — Docker Swarm Stack
# Deploy: docker stack deploy --compose-file docker-stack.yml --with-registry-auth dudenest-backend
# IMAGE variable is injected by GitHub Actions CI: sha-<short_sha>

services:
  server:
    image: ${IMAGE:-ghcr.io/dudenest/dudenest-backend:latest}
    networks: [dudenest, traefik-public]
    environment:
      - APP_ENV=production
      - PORT=8080
    secrets:
      - dudenest_db_url
      - dudenest_redis_url
      - dudenest_jwt_secret
      - dudenest_headscale_api_key
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first       # zero-downtime: new container starts before old stops
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dudenest-backend.rule=Host(`api.dudenest.com`)"
        - "traefik.http.routers.dudenest-backend.entrypoints=websecure"
        - "traefik.http.routers.dudenest-backend.tls=true"
        - "traefik.http.services.dudenest-backend.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dudenest:
    external: true
  traefik-public:
    external: true

secrets:
  dudenest_db_url:
    external: true
  dudenest_redis_url:
    external: true
  dudenest_jwt_secret:
    external: true
  dudenest_headscale_api_key:
    external: true

version: "3.9"

# Dudenest Backend — Docker Swarm Stack
# Deploy: docker stack deploy --compose-file docker-stack.yml --with-registry-auth dudenest-backend
# Credentials: .env file on each Swarm manager at deploy path
# Storage: GlusterFS mounted at /mnt/gv1

services:
  server:
    image: ${IMAGE:-ghcr.io/dudenest/dudenest-backend:latest}
    env_file: .env
    environment:
      - APP_ENV=production
      - PORT=8080
    networks: [dudenest, traefik-public]
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dudenest-api.rule=Host(`api.dudenest.com`)"
        - "traefik.http.routers.dudenest-api.entrypoints=websecure"
        - "traefik.http.routers.dudenest-api.tls=true"
        - "traefik.http.services.dudenest-api.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-storage:/data
    networks: [dudenest]
    deploy:
      replicas: 1
      update_config:
        order: start-first
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

volumes:
  redis-storage:
    driver: local
    driver_opts:
      type: none
      device: /mnt/gv1/dudenest/redis
      o: bind

networks:
  dudenest:
    external: true
  traefik-public:
    external: true

name: Build and Deploy

on:
  push:
    branches: [main, feat/storage-replica]
  pull_request:
    branches: [main, feat/storage-replica]
  workflow_dispatch:        # manual run from any branch (UI dropdown)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dudenest/dudenest-backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # s333: belt-and-suspenders dla third-party actions (Node.js 20 deprecation 2026-06-16 → 2026-09-16 removal)

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build + Test (GitHub-hosted runner)
  # No SSH keys needed — runs on GitHub infra
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed for GHCR push

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # built-in token — no manual secret

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─────────────────────────────────────────────
  # Stage 2: Deploy to NETOL Docker Swarm
  # Runs on self-hosted runner on Swarm manager (sydney)
  # No SSH needed — runner has local Docker socket
  # ─────────────────────────────────────────────
  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, netol-swarm]

    environment:
      name: production
      url: https://api.dudenest.com

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR (for pulling on Swarm)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for any in-progress updates
        run: |
          for svc in $(docker service ls --filter name=dudenest-backend --format '{{.Name}}' 2>/dev/null); do
            state=$(docker service inspect "$svc" --format '{{.UpdateStatus.State}}' 2>/dev/null || echo "")
            if [ "$state" = "updating" ]; then echo "Service updating, waiting 30s..." && sleep 30; fi
          done

      - name: Mirror to registry.netol.io (s323 — eliminates ghcr SPOF at runtime)
        env:
          REGISTRY_NETOL_TOKEN: ${{ secrets.GITLAB_NETOL_IO_TOKEN }}
          REGISTRY_NETOL_USER: ${{ secrets.GITLAB_NETOL_IO_USER }}
          MIRROR_NAME: dudenest/dudenest-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker pull ${{ env.IMAGE_NAME }}:sha-$(echo $IMAGE_TAG | cut -c1-7) 2>/dev/null \
            || docker pull ${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          SOURCE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep dudenest-backend | head -1)
          echo "Source image: $SOURCE"
          echo "$REGISTRY_NETOL_TOKEN" | docker login registry.netol.io -u "$REGISTRY_NETOL_USER" --password-stdin
          docker tag "$SOURCE" registry.netol.io/${MIRROR_NAME}:sha-$(echo $IMAGE_TAG | cut -c1-7)
          docker tag "$SOURCE" registry.netol.io/${MIRROR_NAME}:latest
          docker push registry.netol.io/${MIRROR_NAME}:sha-$(echo $IMAGE_TAG | cut -c1-7)
          docker push registry.netol.io/${MIRROR_NAME}:latest
          echo "✅ mirrored to registry.netol.io/${MIRROR_NAME}"

      - name: Deploy stack to Docker Swarm
        env:
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_REGISTRY: registry.netol.io  # s330: pull from mirror, not ghcr — eliminates ghcr SPOF + visaroy token dependency at Swarm runtime
          DB_URL: ${{ secrets.DUDENEST_DB_URL }}
          REDIS_URL: ${{ secrets.DUDENEST_REDIS_URL }}
          REDIS_PASSWORD: ${{ secrets.DUDENEST_REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.DUDENEST_JWT_SECRET }}
          HEADSCALE_API_URL: ${{ secrets.DUDENEST_HEADSCALE_API_URL }}
          HEADSCALE_API_KEY: ${{ secrets.DUDENEST_HEADSCALE_API_KEY }}
          APP_URL: ${{ vars.DUDENEST_APP_URL || 'https://dudenest.com' }}
          GOOGLE_CLIENT_ID: ${{ secrets.DUDENEST_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.DUDENEST_GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.DUDENEST_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.DUDENEST_GITHUB_CLIENT_SECRET }}
          APPLE_CLIENT_ID: ${{ secrets.DUDENEST_APPLE_CLIENT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEMO_ENABLED: "true"
          DEMO_USER_ID: google:106774657231866582065
          DEMO_USER_EMAIL: dudenest.demo@gmail.com
          CRDB_DSN: ${{ secrets.DUDENEST_CRDB_DSN }}   # s364 HUB-DECOUPLING: empty until secret exists → stack `${CRDB_DSN:-}` stays empty → shadow route dormant. Set secret to `postgresql://backend_ro@10.51.1.212:26257/dudenest_hub?sslmode=disable` to enable /api/v1/_relays_crdb (backend_ro created 2026-07-01, SELECT-only on relays).
          # s337: HUB_URL intentionally NOT injected from secrets — stack file default `${HUB_URL:-http://dudenest-hub_hub:8087}` provides correct internal Swarm DNS. Injection from secrets caused s337 incident (stale value `http://dudenest-backup_backup:8087` from pre-s334 era persisted in secrets, overrode stack default, broke backend→hub proxy for 2+ days post-s334 cutover. Users prcznsk+darek got broken relay data.)
        run: |
          export IMAGE="${DEPLOY_REGISTRY}/dudenest/dudenest-backend:sha-${IMAGE_TAG:0:7}"  # s330: from mirror, not ghcr
          envsubst < docker/backend/docker-stack.yml > /tmp/dudenest-stack.yml
          docker stack deploy \
            --compose-file /tmp/dudenest-stack.yml \
            --with-registry-auth \
            --resolve-image always \
            dudenest-backend

      - name: Verify deployment
        run: |
          echo "Waiting 15s for Swarm to converge..."
          sleep 15
          docker stack ps dudenest-backend --no-trunc
          docker service ls | grep dudenest-backend
          REPLICAS=$(docker service inspect dudenest-backend_server --format '{{.Spec.Mode.Replicated.Replicas}}' 2>/dev/null || echo "0")
          RUNNING=$(docker service ls --filter name=dudenest-backend_server --format '{{.Replicas}}' | cut -d'/' -f1)
          echo "Running: $RUNNING / $REPLICAS"

      - name: Smoke test — OAuth endpoint must redirect (s313 prevention)
        # Catches "Google OAuth not configured" 503 — symptom of a deploy that wiped env vars.
        # If the smoke test fails the workflow fails red, alerting the operator to investigate
        # before users hit the broken endpoint. Does NOT auto-rollback (Swarm with start-first
        # already keeps the old replica alive until new one is healthy).
        run: |
          set +e
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 "https://api.dudenest.com/auth/google?return_url=https%3A%2F%2Fdudenest.com%2F")
            echo "  attempt $i/6 — HTTP $CODE"
            [ "$CODE" = "302" ] && { echo "✅ /auth/google redirects (env vars present)"; exit 0; }
            sleep 10
          done
          echo "❌ /auth/google did not return 302 after 60s — env vars likely missing on backend service."
          echo "Inspect: ssh root@<node> 'docker service inspect dudenest-backend_server --format \"{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}\"'"
          echo "Fix: re-run this workflow with all DUDENEST_* secrets present, or re-deploy via envsubst from a clean shell."
          exit 1
